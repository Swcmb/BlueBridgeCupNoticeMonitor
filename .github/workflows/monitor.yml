name: 蓝桥杯通知监控

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行监控
        id: monitor
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          LANQIAO_DATA: ${{ secrets.LANQIAO_DATA }}
          USE_GITHUB_SECRETS: "true"
        run: |
          python main.py

      - name: 更新历史数据到Secrets
        if: steps.monitor.outputs.lanqiao_data
        uses: actions/github-script@v7
        env:
          NEW_DATA: ${{ steps.monitor.outputs.lanqiao_data }}
        with:
          script: |
            const crypto = require('crypto');
            const newData = process.env.NEW_DATA;
            
            const { data: { key, key_id } } = await github.rest.actions.getRepoPublicKey({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const publicKey = Buffer.from(key, 'base64');
            const encrypted = crypto.publicEncrypt(
              {
                key: publicKey,
                padding: crypto.constants.RSA_PKCS1_OAEP_PADDING,
                oaepHash: 'sha256'
              },
              Buffer.from(newData)
            );
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'LANQIAO_DATA',
              key_id: key_id,
              encrypted_value: encrypted.toString('base64')
            });
            
            console.log('LANQIAO_DATA secret updated successfully')